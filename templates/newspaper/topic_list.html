{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>
    Topics List
  </h1>
  <form action="" method="get">
    {{ search_form|crispy }}
    <button type="submit" class="btn btn-dark text-uppercase mb-3">
      Search
    </button>
  </form>
  <a href="{% url 'catalog:topic-create' %}" class="btn btn-primary link-to-page">
    Create
  </a>
  {% if topic_list %}
    <ul>
      {% for topic in topic_list %}
        <li>
          <a href="{% url "catalog:topic-detail" pk=topic.id %} ">{{ topic.name }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no topics in agency</p>
  {% endif %}
{% endblock %}
