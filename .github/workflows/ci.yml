name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: newspaper_db
          POSTGRES_USER: newspaper_user
          POSTGRES_PASSWORD: newspaper_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: newspaper_agency.settings.prod
      POSTGRES_DB: newspaper_db
      POSTGRES_USER: newspaper_user
      POSTGRES_PASSWORD: newspaper_pass
      POSTGRES_HOST: localhost
      POSTGRES_DB_PORT: 5432
      DJANGO_DEBUG: "False"
      SECRET_KEY: "ci-secret-key-not-for-production"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 . --max-line-length=119 --exclude=migrations,venv,.venv

      - name: Run tests
        run: python manage.py test
